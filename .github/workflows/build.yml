name: Build MotionWake

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-2025-vs2026

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read version
        id: version
        run: |
          $version = (Get-Content version.txt -Raw).Trim()
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Set up Python 3.11 (x64)
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          architecture: "x64"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate icon
        run: python create_icon.py
        shell: pwsh

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --onedir --windowed --name motionwake `
            --add-data "version.txt;." `
            --add-data "assets/icon.ico;assets" `
            --icon "assets/icon.ico" `
            --hidden-import win32timezone `
            --hidden-import pystray._win32 `
            main.py
        shell: pwsh

      - name: Build Installer with Inno Setup
        run: |
          choco install innosetup --no-progress -y
          iscc /DAppVersion=${{ steps.version.outputs.VERSION }} installer\setup.iss
        shell: pwsh

      - name: Upload installer
        uses: actions/upload-artifact@v7
        with:
          name: MotionWake-Setup-v${{ steps.version.outputs.VERSION }}
          path: installer\Output\MotionWake_Setup_v${{ steps.version.outputs.VERSION }}.exe

      - name: Upload EXE (standalone)
        uses: actions/upload-artifact@v7
        with:
          name: MotionWake-EXE-v${{ steps.version.outputs.VERSION }}
          path: dist\motionwake\
